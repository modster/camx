<!DOCTYPE html>
<!--
  webgpu_invert.html
  ==================
  Hidden page loaded inside a WebView by WebGpuProcessor.kt.

  When processImage(dataUrl) is called from Kotlin via evaluateJavascript(),
  this page:
    1. Decodes the JPEG data-URL into an ImageBitmap.
    2. Uploads it to a GPUTexture.
    3. Runs a WGSL fragment shader that inverts every RGB channel:
         output.rgb = vec3(1.0) - input.rgb
    4. Reads the result canvas back as a PNG data-URL.
    5. Calls AndroidInterface.onProcessed(dataUrl) to hand the result
       back to the Kotlin side.

  If the device's WebView does not support WebGPU (older devices / WebView
  versions), the page falls back to an equivalent Canvas 2D inversion so
  the feature always produces a result.
-->
<html>
<head>
  <meta charset="UTF-8">
  <title>WebGPU Color Inverter</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
'use strict';

// ── WGSL shader ───────────────────────────────────────────────────────────────
const SHADER_CODE = `
struct VertexOutput {
  @builtin(position) position : vec4<f32>,
  @location(0)       texCoord : vec2<f32>,
}

// Full-screen triangle covering NDC [-1, 1] × [-1, 1].
// Six vertices (two triangles) supplied via vertex_index.
@vertex
fn vs_main(@builtin(vertex_index) idx : u32) -> VertexOutput {
  var positions = array<vec2<f32>, 6>(
    vec2<f32>(-1.0, -1.0),
    vec2<f32>( 1.0, -1.0),
    vec2<f32>(-1.0,  1.0),
    vec2<f32>(-1.0,  1.0),
    vec2<f32>( 1.0, -1.0),
    vec2<f32>( 1.0,  1.0),
  );
  var texCoords = array<vec2<f32>, 6>(
    vec2<f32>(0.0, 1.0),
    vec2<f32>(1.0, 1.0),
    vec2<f32>(0.0, 0.0),
    vec2<f32>(0.0, 0.0),
    vec2<f32>(1.0, 1.0),
    vec2<f32>(1.0, 0.0),
  );
  var out : VertexOutput;
  out.position = vec4<f32>(positions[idx], 0.0, 1.0);
  out.texCoord = texCoords[idx];
  return out;
}

@group(0) @binding(0) var myTexture : texture_2d<f32>;
@group(0) @binding(1) var mySampler : sampler;

// Color inversion: subtract each channel from 1.0, keep alpha unchanged.
@fragment
fn fs_main(in : VertexOutput) -> @location(0) vec4<f32> {
  let c = textureSample(myTexture, mySampler, in.texCoord);
  return vec4<f32>(1.0 - c.r, 1.0 - c.g, 1.0 - c.b, c.a);
}
`;

// ── Globals ───────────────────────────────────────────────────────────────────
let gpuDevice = null;
let gpuPipeline = null;
let gpuSampler = null;
let presentationFormat = null;
let useWebGPU = false;

// ── Initialisation ────────────────────────────────────────────────────────────
async function initWebGPU() {
  if (!navigator.gpu) {
    console.warn('WebGPU not supported – falling back to Canvas 2D');
    notifyReady();
    return;
  }

  try {
    const adapter = await navigator.gpu.requestAdapter();
    if (!adapter) {
      console.warn('No WebGPU adapter – falling back to Canvas 2D');
      notifyReady();
      return;
    }

    gpuDevice = await adapter.requestDevice();
    presentationFormat = navigator.gpu.getPreferredCanvasFormat();

    // Pre-build the pipeline (format is fixed; size varies per image)
    const shaderModule = gpuDevice.createShaderModule({ code: SHADER_CODE });
    gpuPipeline = gpuDevice.createRenderPipeline({
      layout: 'auto',
      vertex:   { module: shaderModule, entryPoint: 'vs_main' },
      fragment: {
        module: shaderModule,
        entryPoint: 'fs_main',
        targets: [{ format: presentationFormat }],
      },
      primitive: { topology: 'triangle-list' },
    });

    gpuSampler = gpuDevice.createSampler({
      magFilter: 'linear',
      minFilter: 'linear',
    });

    useWebGPU = true;
    console.log('WebGPU initialised successfully');
  } catch (err) {
    console.warn('WebGPU init error:', err, '– falling back to Canvas 2D');
  }

  notifyReady();
}

function notifyReady() {
  if (window.AndroidInterface && window.AndroidInterface.onReady) {
    window.AndroidInterface.onReady();
  }
}

// ── Process an image ──────────────────────────────────────────────────────────
/**
 * Entry point called by WebGpuProcessor.kt via evaluateJavascript().
 * @param {string} base64Data  A data:image/jpeg;base64,… URL.
 */
async function processImage(base64Data) {
  try {
    if (useWebGPU) {
      await processWithWebGPU(base64Data);
    } else {
      await processWithCanvas2D(base64Data);
    }
  } catch (err) {
    console.error('processImage error:', err);
    // Best-effort fallback
    try { await processWithCanvas2D(base64Data); } catch (_) {}
    notifyProcessed(null);
  }
}

// ── WebGPU path ───────────────────────────────────────────────────────────────
async function processWithWebGPU(base64Data) {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('webgpu');

  // Decode image
  const img = new Image();
  img.src = base64Data;
  await img.decode();

  canvas.width  = img.width;
  canvas.height = img.height;

  ctx.configure({
    device: gpuDevice,
    format: presentationFormat,
    alphaMode: 'opaque',
  });

  const imageBitmap = await createImageBitmap(img);

  // Upload image to a GPU texture
  const texture = gpuDevice.createTexture({
    size: [imageBitmap.width, imageBitmap.height, 1],
    format: 'rgba8unorm',
    usage:
      GPUTextureUsage.TEXTURE_BINDING |
      GPUTextureUsage.COPY_DST        |
      GPUTextureUsage.RENDER_ATTACHMENT,
  });
  gpuDevice.queue.copyExternalImageToTexture(
    { source: imageBitmap },
    { texture },
    [imageBitmap.width, imageBitmap.height],
  );
  imageBitmap.close();

  // Bind texture + sampler
  const bindGroup = gpuDevice.createBindGroup({
    layout: gpuPipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: texture.createView() },
      { binding: 1, resource: gpuSampler },
    ],
  });

  // Render
  const encoder = gpuDevice.createCommandEncoder();
  const pass = encoder.beginRenderPass({
    colorAttachments: [{
      view: ctx.getCurrentTexture().createView(),
      clearValue: { r: 0, g: 0, b: 0, a: 1 },
      loadOp:  'clear',
      storeOp: 'store',
    }],
  });
  pass.setPipeline(gpuPipeline);
  pass.setBindGroup(0, bindGroup);
  pass.draw(6);
  pass.end();

  gpuDevice.queue.submit([encoder.finish()]);
  await gpuDevice.queue.onSubmittedWorkDone();

  texture.destroy();

  const result = canvas.toDataURL('image/png');
  notifyProcessed(result);
}

// ── Canvas 2D fallback path ───────────────────────────────────────────────────
async function processWithCanvas2D(base64Data) {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const img = new Image();
  img.src = base64Data;
  await img.decode();

  canvas.width  = img.width;
  canvas.height = img.height;
  ctx.drawImage(img, 0, 0);

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = imageData.data;
  for (let i = 0; i < d.length; i += 4) {
    d[i]     = 255 - d[i];     // R
    d[i + 1] = 255 - d[i + 1]; // G
    d[i + 2] = 255 - d[i + 2]; // B
    // d[i + 3] unchanged (alpha)
  }
  ctx.putImageData(imageData, 0, 0);

  const result = canvas.toDataURL('image/png');
  notifyProcessed(result);
}

function notifyProcessed(dataUrl) {
  if (window.AndroidInterface && window.AndroidInterface.onProcessed) {
    window.AndroidInterface.onProcessed(dataUrl || '');
  }
}

// Start initialisation when the page loads
initWebGPU();
</script>
</body>
</html>
